version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - ENABLE_MOCK_MODE=true
      - ENABLE_CASCADING=true
      - ENABLE_BUDGET_ENFORCEMENT=true
      - MONTHLY_BUDGET=500
      - DAILY_BUDGET=20
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s